<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>文本加密终端Pro·v9</title>
<style>
    :root { --p: #00ff41; --bg: #0a0a0a; }
    body { background: var(--bg); color: #fff; font-family: 'Courier New', monospace; padding: 20px; display: flex; justify-content: center; }
    .container { width: 100%; max-width: 600px; background: #1a1a1a; border: 1px solid #333; padding: 25px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); }
    h2 { text-align: center; color: var(--p); text-shadow: 0 0 10px var(--p); letter-spacing: 2px; }

    .gear-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
    .gear-item { background: #111; border: 1px solid #444; padding: 10px; border-radius: 5px; }
    .gear-item label { display: block; font-size: 10px; color: #888; margin-bottom: 5px; }

    input, textarea { width: 100%; background: #000; border: 1px solid #444; color: var(--p); padding: 12px; border-radius: 5px; box-sizing: border-box; font-size: 16px; outline: none; }
    textarea { margin-top: 10px; resize: vertical; border-color: var(--p); }

    .btn-group { display: grid; grid-template-columns: 1fr; gap: 10px; margin-top: 15px; }
    .btn-row-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .btn-row-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }

    button { padding: 12px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 15px; }
    .btn-run { background: var(--p); color: #000; font-size: 18px; box-shadow: 0 0 15px rgba(0, 255, 51, 0.473); }
    .btn-save { background: #2168d3; color: #fff; }
    .btn-util { background: #333131; color: #ccc; }
    button:active { transform: scale(0.95); }
</style>
</head>

<body>
<div class="container">
    <h2>文本加密终端Pro·v9</h2>

    <div class="gear-grid">
        <div class="gear-item">
            <label>参数 A</label>
            <input type="number" id="gA" value="8765">
        </div>
        <div class="gear-item">
            <label>参数 B</label>
            <input type="number" id="gB" value="512">
        </div>
        <div class="gear-item">
            <label>参数 C</label>
            <input type="number" id="gC" value="1024">
        </div>
        <div class="gear-item">
            <label>参数 D</label>
            <input type="number" id="gD" value="3">
        </div>
    </div>

    <input type="password" id="key" placeholder="输入核心访问密钥...">
    <input type="text" id="fname" placeholder="自定义文件名前缀（可选）">

    <textarea id="data" rows="8" placeholder="在此输入数据..."></textarea>

    <div class="btn-group">
        <div class="btn-row-2">
            <button class="btn-run" onclick="run(true)">🔒 执行加密</button>
            <button class="btn-save" onclick="doLoad()">📂 导入 txt</button>
        </div>

        <div class="btn-row-3">
            <button class="btn-util" onclick="run(false)">🔓 解密</button>
            <button class="btn-util" onclick="doClear()">🧹 清空</button>
            <button class="btn-util" onclick="doCopy()">📋 复制</button>
        </div>

        <button class="btn-save" onclick="doSave()">💾 导出 txt</button>
    </div>
</div>

<script>
// ========== 工具函数 ==========

function isWeakPassword(pw) {
    if (!pw || pw.length < 8) return true;
    const onlyNum = /^[0-9]+$/.test(pw);
    const onlyLetter = /^[a-zA-Z]+$/.test(pw);
    if (onlyNum || onlyLetter) return true;
    const common = ["123456", "12345678", "password", "qwerty", "111111", "000000"];
    if (common.includes(pw)) return true;
    return false;
}

function bytesToBase64(bytes) {
    let binary = "";
    for (let i = 0; i < bytes.length; i++) {
        binary += String.fromCharCode(bytes[i]);
    }
    return btoa(binary);
}

function base64ToBytes(base64) {
    const binary = atob(base64);
    const len = binary.length;
    const bytes = new Uint8Array(len);
    for (let i = 0; i < len; i++) {
        bytes[i] = binary.charCodeAt(i);
    }
    return bytes;
}

function formatCipherText(b64, groupSize = 64) {
    const clean = b64.replace(/\s+/g, "");
    const parts = [];
    for (let i = 0; i < clean.length; i += groupSize) {
        parts.push(clean.slice(i, i + groupSize));
    }
    return parts.join("\n");
}

function autoCopy(text) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).catch(() => {});
    } else {
        const ta = document.createElement("textarea");
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); } catch(e) {}
        document.body.removeChild(ta);
    }
}

function bytesToHex(bytes) {
    return Array.from(bytes).map(b => b.toString(16).padStart(2, "0")).join("");
}

function hexToBytes(hex) {
    const clean = hex.replace(/[^0-9a-fA-F]/g, "");
    const len = clean.length;
    const out = new Uint8Array(len / 2);
    for (let i = 0; i < len; i += 2) {
        out[i / 2] = parseInt(clean.substr(i, 2), 16);
    }
    return out;
}

function constantTimeEqual(a, b) {
    if (a.length !== b.length) return false;
    let diff = 0;
    for (let i = 0; i < a.length; i++) {
        diff |= a[i] ^ b[i];
    }
    return diff === 0;
}

// ========== PBKDF2：派生 AES 密钥 + HMAC 密钥 ==========

async function deriveKeys(password, gA, gB, gC, gD) {
    const enc = new TextEncoder().encode(password);

    const baseKey = await crypto.subtle.importKey(
        "raw",
        enc,
        "PBKDF2",
        false,
        ["deriveBits"]
    );

    const iterBase = 200000;
    const iterDelta = Math.abs(parseInt(gA) || 0) % 50000;
    const iterations = iterBase + iterDelta;

    const saltStr = "TextEncryptorPro_v9_" + (gB || "0") + "_" + (gC || "0") + "_" + (gD || "0");
    const salt = new TextEncoder().encode(saltStr);

    const bits = await crypto.subtle.deriveBits(
        {
            name: "PBKDF2",
            salt,
            iterations,
            hash: "SHA-256"
        },
        baseKey,
        512 // 256 bit AES + 256 bit HMAC
    );

    const bytes = new Uint8Array(bits);
    const aesKeyBytes = bytes.slice(0, 32);
    const hmacKeyBytes = bytes.slice(32);

    const aesKey = await crypto.subtle.importKey(
        "raw",
        aesKeyBytes,
        { name: "AES-GCM" },
        false,
        ["encrypt", "decrypt"]
    );

    const hmacKey = await crypto.subtle.importKey(
        "raw",
        hmacKeyBytes,
        {
            name: "HMAC",
            hash: "SHA-256"
        },
        false,
        ["sign", "verify"]
    );

    return { aesKey, hmacKey };
}

// ========== 核心：加密 / 解密（AES-GCM + HMAC） ==========

async function run(isEnc) {
    const d = document.getElementById('data');
    const keyText = document.getElementById('key').value;

    const gA = document.getElementById('gA').value;
    const gB = document.getElementById('gB').value;
    const gC = document.getElementById('gC').value;
    const gD = document.getElementById('gD').value;

    if (!d.value || !keyText) {
        alert("密钥或内容缺失");
        return;
    }

    if (isEnc && isWeakPassword(keyText)) {
        alert("密钥过弱，请使用至少 8 位且包含字母和数字的复杂密码");
        return;
    }

    try {
        if (isEnc) {
            // 加密
            const iv = crypto.getRandomValues(new Uint8Array(12));
            const { aesKey, hmacKey } = await deriveKeys(keyText, gA, gB, gC, gD);

            const encBytes = new TextEncoder().encode(d.value);
            const cipherBuf = await crypto.subtle.encrypt(
                { name: "AES-GCM", iv },
                aesKey,
                encBytes
            );

            const cipherBytes = new Uint8Array(cipherBuf);
            const full = new Uint8Array(iv.length + cipherBytes.length);
            full.set(iv, 0);
            full.set(cipherBytes, iv.length);

            const b64 = bytesToBase64(full);

            // 生成 HMAC（对 full 做签名）
            const sigBuf = await crypto.subtle.sign(
                "HMAC",
                hmacKey,
                full
            );
            const sigBytes = new Uint8Array(sigBuf);
            const sigHex = bytesToHex(sigBytes);

            const formatted = "v9:\n" + formatCipherText(b64, 64) + "\nHMAC:" + sigHex;

            d.value = formatted;
            autoCopy(formatted);
            alert("加密完成（AES-GCM + HMAC），已自动复制密文");
        } else {
            // 解密
            let txt = d.value.trim();

            if (!txt.startsWith("v9:")) {
                alert("密文版本不匹配（需要 v9: 前缀）");
                return;
            }

            txt = txt.slice(3).trim();

            const lines = txt.split(/\r?\n/).map(l => l.trim()).filter(l => l.length > 0);
            if (lines.length < 2) {
                alert("密文格式错误（缺少 HMAC 行）");
                return;
            }

            const hmacLine = lines[lines.length - 1];
            const hmacMatch = hmacLine.match(/^HMAC:([0-9a-fA-F]+)$/);
            if (!hmacMatch) {
                alert("HMAC 行格式错误");
                return;
            }

            const sigHex = hmacMatch[1];
            const sigBytes = hexToBytes(sigHex);

            const b64 = lines.slice(0, -1).join("");
            const fullBytes = base64ToBytes(b64);

            if (fullBytes.length < 13) {
                alert("密文内容长度异常");
                return;
            }

            const { aesKey, hmacKey } = await deriveKeys(keyText, gA, gB, gC, gD);

            // 验证 HMAC
            const expectSigBuf = await crypto.subtle.sign(
                "HMAC",
                hmacKey,
                fullBytes
            );
            const expectSigBytes = new Uint8Array(expectSigBuf);

            if (!constantTimeEqual(sigBytes, expectSigBytes)) {
                alert("HMAC 验证失败：密文可能被篡改或密钥/参数不一致");
                return;
            }

            const iv = fullBytes.slice(0, 12);
            const cipherBytes = fullBytes.slice(12);

            const plainBuf = await crypto.subtle.decrypt(
                { name: "AES-GCM", iv },
                aesKey,
                cipherBytes
            );

            const plainText = new TextDecoder().decode(plainBuf);
            d.value = plainText;
        }
    } catch (e) {
        console.error(e);
        alert("解密失败：密钥错误、参数不一致或内容损坏");
    }
}

// ========== 文件导入 ==========

function doLoad() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.txt';

    input.onchange = e => {
        const file = e.target.files[0];
        if (!file) return;

        const name = file.name;
        const match = name.match(/_A(\d+)_B(\d+)_C(\d+)_D(\d+)/);

        if (match) {
            document.getElementById('gA').value = match[1];
            document.getElementById('gB').value = match[2];
            document.getElementById('gC').value = match[3];
            document.getElementById('gD').value = match[4];
        }

        const reader = new FileReader();
        reader.onload = () => {
            document.getElementById('data').value = reader.result;
            alert("TXT 文件已导入");
        };
        reader.readAsText(file, 'utf-8');
    };

    input.click();
}

// ========== 文件导出 ==========

function doSave() {
    const text = document.getElementById('data').value;

    const gA = document.getElementById('gA').value;
    const gB = document.getElementById('gB').value;
    const gC = document.getElementById('gC').value;
    const gD = document.getElementById('gD').value;

    let prefix = document.getElementById('fname').value.trim();
    if (!prefix) prefix = "文本加密终端Pro·v9";

    const filename = `${prefix}_A${gA}_B${gB}_C${gC}_D${gD}.txt`;

    const blob = new Blob([text], {type: 'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
}

// ========== 复制 / 清空 ==========

function doCopy() {
    const text = document.getElementById('data').value;
    if (!text) {
        alert("没有内容可复制");
        return;
    }
    autoCopy(text);
    alert("已复制当前内容");
}

function doClear() {
    document.getElementById('data').value = "";
    alert("已清空输入内容");
}
</script>

</body>
</html>
